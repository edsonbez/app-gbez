<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Estúdio GBez</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        .logo { width: 85px; border-radius: 18px; border: 2px solid #fff; margin-bottom: 10px; }
        h1 { font-size: 18px; margin-bottom: 5px; }
        
        /* TEXTO DE INSTRUÇÃO CORRIGIDO */
        #instruction-step { 
            background: #1c1c1e; 
            color: #fff; 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 15px;
            border: 1px solid #333;
            width: 85%;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        /* ÍCONES REAIS DO IOS */
        .icon-ios {
            display: inline-flex;
            width: 20px;
            height: 20px;
            margin: 0 8px;
            vertical-align: middle;
        }

        #ios-guide { display: none; width: 85%; max-width: 280px; position: relative; }
        .tutorial-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #444; }
        .video-tutorial { width: 100%; display: block; }

        .btn-install { background: #fff; color: #000; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; border: none; display: none; margin-top: 20px; }
        .skip-link { margin-top: 25px; color: #fff; text-decoration: underline; font-size: 13px; cursor: pointer; opacity: 0.8; }
    </style>
</head>
<body>

    <img src="icon.png" class="logo">
    <h1>Estúdio Gabriela Bez</h1>

    <div id="ios-guide">
        <div id="instruction-step">
            1. Toque em 
            <svg class="icon-ios" viewBox="0 0 50 50" fill="none" stroke="#007AFF" stroke-width="3">
                <rect x="15" y="20" width="20" height="20" rx="2"/>
                <path d="M25 25V5M25 5L18 12M25 5L32 12"/>
            </svg>
            (compartilhar)
        </div>
        <div class="tutorial-wrapper">
            <video id="videoTutorial" autoplay loop muted playsinline class="video-tutorial">
                <source src="tutorial.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <button id="btnAndroid" class="btn-install">INSTALAR APP AGORA</button>
    <div class="skip-link" id="btnSkip">Já tenho o app ou quero entrar agora</div>

    <script>
        const iosGuide = document.getElementById('ios-guide');
        const instructionStep = document.getElementById('instruction-step');
        const hotmartUrl = "https://hotmart.com/pt-br/club/estudio-gabriela-bez/products/1547543?access_source=post_purchase_whatsapp";

        //const isIos = true;
        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (isStandalone) window.location.href = hotmartUrl;

        if (isIos && !isStandalone) {
            iosGuide.style.display = 'block';
            
            // Alterna entre os dois passos com os ícones corretos
            setInterval(() => {
                instructionStep.style.opacity = 0;
                setTimeout(() => {
                    if (instructionStep.innerHTML.includes("1.")) {
                        instructionStep.innerHTML = `2. Toque em 
                            <svg class="icon-ios" viewBox="0 0 50 50" fill="none" stroke="#fff" stroke-width="3">
                                <rect x="10" y="10" width="30" height="30" rx="5"/>
                                <line x1="25" y1="18" x2="25" y2="32"/>
                                <line x1="18" y1="25" x2="32" y2="25"/>
                            </svg> 
                            Adicionar à Tela de Início`;
                    } else {
                        instructionStep.innerHTML = `1. Toque em 
                            <svg class="icon-ios" viewBox="0 0 50 50" fill="none" stroke="#007AFF" stroke-width="3">
                                <rect x="15" y="20" width="20" height="20" rx="2"/>
                                <path d="M25 25V5M25 5L18 12M25 5L32 12"/>
                            </svg>
                            (compartilhar)`;
                    }
                    instructionStep.style.opacity = 1;
                }, 300);
            }, 3500);
        }

        document.getElementById('btnSkip').onclick = () => window.location.href = hotmartUrl;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            const btnAndroid = document.getElementById('btnAndroid');
            btnAndroid.style.display = 'block';
            iosGuide.style.display = 'none';
            btnAndroid.onclick = () => e.prompt();
        });
    </script>
</body>
</html>
